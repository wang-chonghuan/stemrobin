<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} · StemRobin</title>

<!-- Formula rendering: KaTeX (standard, self-contained). Auto-render on load. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}],throwOnError:false});"></script>

<style>
  /* StemRobin DESIGN.md tokens — kept inline so the lesson is a standalone file
     the frontend can load directly (it does not inherit the app's app.css). */
  :root {
    --sr-white:#FFFFFF; --sr-panel:#F5F9F9; --sr-card:#FFFFFF;
    --sr-blue:#0E7C9B; --sr-blue-deep:#0A5E76; --sr-blue-tint:#E1F1F5;
    --sr-green:#15A06A; --sr-green-deep:#0F7D52; --sr-green-tint:#E4F6EE;
    --sr-ink:#15201F; --sr-ink-soft:#4C5A58; --sr-ink-dim:#8A9795;
    --sr-line:#E3EAE9; --sr-line-soft:#EEF3F2;
    --sr-radius:10px; --sr-radius-sm:8px;
    --sr-display:"Bricolage Grotesque","Hanken Grotesk",system-ui,sans-serif;
    --sr-body:"Hanken Grotesk",system-ui,sans-serif;
    --sr-mono:"JetBrains Mono",ui-monospace,monospace;
  }
  @import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap");

  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--sr-white); color:var(--sr-ink);
    font-family:var(--sr-body); line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .sr-lesson { max-width:760px; margin:0 auto; padding:24px 22px 40px; }

  /* header */
  .sr-l-head { border-bottom:1px solid var(--sr-line); padding-bottom:16px; margin-bottom:8px; }
  .sr-l-eyebrow { color:var(--sr-blue-deep); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .sr-l-title { margin:6px 0 4px; font-family:var(--sr-display); font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1.15; }
  .sr-l-concept { color:var(--sr-ink-soft); font-size:14.5px; }
  .sr-l-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .sr-chip { display:inline-flex; align-items:center; border-radius:999px; padding:3px 9px; background:var(--sr-blue-tint); color:var(--sr-blue-deep); font-size:11.5px; font-weight:600; }
  .sr-chip.green { background:var(--sr-green-tint); color:var(--sr-green-deep); }

  /* sections */
  section { margin-top:26px; }
  .sr-sec-label { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; }
  .sr-sec-num { font-family:var(--sr-mono); font-size:13px; font-weight:600; color:#fff; background:var(--sr-blue); border-radius:6px; padding:1px 8px; }
  .sr-sec-name { font-family:var(--sr-display); font-size:18px; font-weight:600; }
  section p { margin:10px 0; font-size:15px; }
  section h3 { font-family:var(--sr-display); font-size:15.5px; font-weight:600; margin:18px 0 6px; }
  strong { color:var(--sr-ink); }
  .sr-term { color:var(--sr-blue-deep); font-weight:600; }            /* 正式术语首次出现 */
  code { font-family:var(--sr-mono); font-size:.92em; background:var(--sr-panel); padding:1px 5px; border-radius:5px; }

  /* callouts */
  .sr-note { border-left:3px solid var(--sr-blue); background:var(--sr-blue-tint); border-radius:0 8px 8px 0; padding:10px 14px; margin:14px 0; font-size:14px; }
  .sr-pitfall { border-left:3px solid var(--sr-green); background:var(--sr-green-tint); border-radius:0 8px 8px 0; padding:10px 14px; margin:14px 0; font-size:14px; }
  .sr-pitfall b, .sr-note b { color:var(--sr-ink); }

  /* worked examples */
  .sr-example { border:1px solid var(--sr-line); border-radius:var(--sr-radius); padding:14px 16px; margin:12px 0; background:var(--sr-card); }
  .sr-example-h { font-family:var(--sr-display); font-size:14.5px; font-weight:600; margin-bottom:6px; }
  .sr-step { display:flex; gap:10px; margin:6px 0; font-size:14.5px; }
  .sr-step-n { flex:none; font-family:var(--sr-mono); font-size:12px; font-weight:600; color:var(--sr-blue-deep); }

  /* practice */
  ol.sr-practice { padding-left:0; list-style:none; counter-reset:p; }
  ol.sr-practice > li { counter-increment:p; position:relative; padding:9px 0 9px 34px; border-top:1px solid var(--sr-line-soft); font-size:14.5px; }
  ol.sr-practice > li:first-child { border-top:0; }
  ol.sr-practice > li::before { content:counter(p); position:absolute; left:0; top:9px; width:22px; height:22px; display:grid; place-items:center; border-radius:6px; background:var(--sr-panel); color:var(--sr-ink-soft); font-family:var(--sr-mono); font-size:11.5px; font-weight:600; }
  .sr-ptype { display:inline-block; margin-right:6px; border-radius:5px; padding:0 6px; background:var(--sr-blue-tint); color:var(--sr-blue-deep); font-size:10.5px; font-weight:700; vertical-align:1px; }
  details.sr-answer { margin-top:6px; }
  details.sr-answer summary { color:var(--sr-blue-deep); font-size:12.5px; font-weight:600; cursor:pointer; }
  details.sr-answer > div { margin-top:5px; color:var(--sr-ink-soft); font-size:14px; }

  /* figures (inline SVG) */
  figure.sr-fig { margin:14px 0; text-align:center; }
  figure.sr-fig svg { max-width:100%; height:auto; border:1px solid var(--sr-line); border-radius:8px; background:var(--sr-white); }
  figure.sr-fig figcaption { margin-top:6px; color:var(--sr-ink-dim); font-size:12px; }

  /* connections */
  ul.sr-links { padding-left:0; list-style:none; }
  ul.sr-links > li { padding:8px 0; border-top:1px solid var(--sr-line-soft); font-size:14.5px; }
  ul.sr-links > li:first-child { border-top:0; }
  ul.sr-links b { color:var(--sr-blue-deep); }


  @media (prefers-color-scheme: dark) { /* lessons render on white inside an app frame; keep light. */ }
</style>
</head>
<body>
<article class="sr-lesson">

  <header class="sr-l-head">
    <div class="sr-l-eyebrow">{{EYEBROW}}</div>
    <h1 class="sr-l-title">{{TITLE}}</h1>
    <div class="sr-l-concept">{{CONCEPT}}</div>
    <div class="sr-l-chips">{{CHIPS}}</div>
  </header>

  <!-- 1 / 为什么学这个（引子问题） -->
  <section data-sr-section="motivation">
    <div class="sr-sec-label"><span class="sr-sec-num">1</span><span class="sr-sec-name">为什么学这个</span></div>
    {{MOTIVATION}}
  </section>

  <!-- 2 / 讲解 -->
  <section data-sr-section="explain">
    <div class="sr-sec-label"><span class="sr-sec-num">2</span><span class="sr-sec-name">讲解</span></div>
    {{EXPLAIN}}
  </section>

  <!-- 3 / 例题 -->
  <section data-sr-section="examples">
    <div class="sr-sec-label"><span class="sr-sec-num">3</span><span class="sr-sec-name">例题</span></div>
    {{EXAMPLES}}
  </section>

  <!-- 4 / 与其他知识点的联系 -->
  <section data-sr-section="connections">
    <div class="sr-sec-label"><span class="sr-sec-num">4</span><span class="sr-sec-name">与其他知识点的联系</span></div>
    {{CONNECTIONS}}
  </section>

  <!-- 5 / 练习 -->
  <section data-sr-section="practice">
    <div class="sr-sec-label"><span class="sr-sec-num">5</span><span class="sr-sec-name">练习</span></div>
    {{PRACTICE}}
  </section>

</article>
</body>
</html>
